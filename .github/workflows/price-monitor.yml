name: Daily Price Monitor

on:
  schedule:
    - cron: "0 0 * * *"  # 09:00 JST daily (cron is UTC)
  workflow_dispatch:       # lets you trigger a manual test run from the GitHub UI

# ── Runner options ────────────────────────────────────────────────────────────
# Biccamera blocks GitHub/Azure IPs. Two ways to work around this:
#
# Option A – Residential/VPS proxy (quick, no hardware needed)
#   Add a PRICE_MONITOR_HTTPS_PROXY secret, e.g. "http://user:pass@host:port".
#   urllib honours HTTPS_PROXY automatically, so no code changes are needed.
#   Free options: Webshare free tier (10 GB/mo), or your own VPS with Squid.
#
# Option B – Self-hosted runner (most reliable, zero proxy cost)
#   Register a runner on a home machine or a Japanese VPS:
#     GitHub repo → Settings → Actions → Runners → New self-hosted runner
#   Then change `runs-on: ubuntu-latest` to `runs-on: self-hosted` below.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  check-price:
    runs-on: ubuntu-latest  # change to `self-hosted` for Option B
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Biccamera price
        env:
          SMTP_HOST:   ${{ secrets.PRICE_MONITOR_SMTP_HOST }}
          SMTP_PORT:   ${{ secrets.PRICE_MONITOR_SMTP_PORT }}
          SMTP_USER:   ${{ secrets.PRICE_MONITOR_SMTP_USER }}
          SMTP_PASS:   ${{ secrets.PRICE_MONITOR_SMTP_PASS }}
          ALERT_TO:    ${{ secrets.PRICE_MONITOR_ALERT_TO }}
          WEBHOOK_URL: ${{ secrets.PRICE_MONITOR_WEBHOOK_URL }}
          # Proxy support (Option A) — leave unset to skip
          HTTPS_PROXY: ${{ secrets.PRICE_MONITOR_HTTPS_PROXY }}
          HTTP_PROXY:  ${{ secrets.PRICE_MONITOR_HTTPS_PROXY }}
        run: python price-monitor/monitor.py
